<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Jetayu Gadgets — Price Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080b14;
        --surface: #0e1221;
        --surface2: #141828;
        --border: #1e2336;
        --border2: #252b42;
        --accent: #4f8ef7;
        --accent-glow: rgba(79, 142, 247, 0.15);
        --green: #34d399;
        --green-bg: rgba(52, 211, 153, 0.12);
        --red: #f87171;
        --red-bg: rgba(248, 113, 113, 0.1);
        --yellow: #fbbf24;
        --text: #dde3f0;
        --text-dim: #8892aa;
        --muted: #4a5268;
        --jetayu: #818cf8;
        --jetayu-bg: rgba(129, 140, 248, 0.14);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", system-ui, sans-serif;
        min-height: 100vh;
        background-image: radial-gradient(
          ellipse 60% 40% at 50% -10%,
          rgba(79, 142, 247, 0.08) 0%,
          transparent 70%
        );
      }

      /* ── Header ── */
      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 32px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(12px);
        background: rgba(14, 18, 33, 0.85);
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header-icon {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, #4f8ef7, #818cf8);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
      }

      header h1 {
        font-family: "Syne", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.01em;
      }

      header h1 span {
        color: var(--accent);
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      #last-scraped {
        font-family: "DM Mono", monospace;
        font-size: 0.7rem;
        color: var(--muted);
        background: var(--surface2);
        border: 1px solid var(--border);
        padding: 4px 10px;
        border-radius: 6px;
      }

      /* ── Toolbar ── */
      .toolbar {
        padding: 20px 32px 0;
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .search-wrap {
        position: relative;
      }
      .search-wrap svg {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        pointer-events: none;
      }
      input[type="search"] {
        background: var(--surface2);
        border: 1px solid var(--border2);
        color: var(--text);
        padding: 9px 14px 9px 36px;
        border-radius: 10px;
        font-size: 0.85rem;
        font-family: "DM Sans", sans-serif;
        width: 280px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      input[type="search"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }
      input[type="search"]::placeholder {
        color: var(--muted);
      }

      /* ── Legend ── */
      .legend {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        align-items: center;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 0.75rem;
        color: var(--text-dim);
        font-family: "DM Sans", sans-serif;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      /* ── Table wrapper ── */
      .table-wrap {
        padding: 4px 32px 64px;
        overflow-x: auto;
      }

      /* Scrollbar */
      .table-wrap::-webkit-scrollbar {
        height: 6px;
      }
      .table-wrap::-webkit-scrollbar-track {
        background: var(--surface);
      }
      .table-wrap::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 3px;
      }

      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 0.82rem;
      }

      /* ── Header row ── */
      thead tr {
        background: var(--surface2);
      }
      th {
        color: var(--text-dim);
        font-family: "DM Sans", sans-serif;
        font-weight: 600;
        font-size: 0.72rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 12px 14px;
        text-align: center;
        border-bottom: 1px solid var(--border2);
        border-top: 1px solid var(--border);
        white-space: nowrap;
        background: var(--surface2);
      }

      /* First two columns left-aligned */
      th:first-child,
      th:nth-child(2) {
        text-align: left;
      }
      th:first-child {
        border-radius: 0;
        padding-left: 16px;
        width: 48px;
      }

      /* ── Body rows ── */
      td {
        padding: 11px 14px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
        transition: background 0.15s;
      }

      tbody tr:hover td {
        background: rgba(79, 142, 247, 0.035);
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      /* Zebra stripe */
      tbody tr:nth-child(even) td {
        background: rgba(255, 255, 255, 0.012);
      }
      tbody tr:nth-child(even):hover td {
        background: rgba(79, 142, 247, 0.04);
      }

      /* Row number */
      td:first-child {
        color: var(--muted);
        font-family: "DM Mono", monospace;
        font-size: 0.72rem;
        padding-left: 16px;
        text-align: left;
      }

      /* Product name */
      .product-name {
        font-weight: 600;
        color: var(--text);
        font-size: 0.83rem;
        letter-spacing: -0.01em;
        text-align: left;
      }

      /* ── Price cells ── */
      .price-cell {
        text-align: center;
        white-space: nowrap;
      }
      .price-cell a {
        text-decoration: none;
      }

      .price-tag {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 7px;
        font-family: "DM Mono", monospace;
        font-weight: 500;
        font-size: 0.78rem;
        letter-spacing: -0.02em;
        transition:
          filter 0.15s,
          transform 0.15s;
      }
      .price-cell a:hover .price-tag {
        filter: brightness(1.15);
        transform: translateY(-1px);
      }

      .price-lowest {
        background: var(--green-bg);
        color: var(--green);
        border: 1px solid rgba(52, 211, 153, 0.2);
      }
      .price-highest {
        background: var(--red-bg);
        color: var(--red);
        border: 1px solid rgba(248, 113, 113, 0.2);
      }
      .price-mid {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-dim);
        border: 1px solid var(--border);
      }
      .price-jetayu {
        background: var(--jetayu-bg);
        color: var(--jetayu);
        border: 1px solid rgba(129, 140, 248, 0.25);
      }
      .price-na {
        color: var(--muted);
        font-family: "DM Mono", monospace;
        font-size: 0.72rem;
      }

      /* savings col */
      th:last-child {
        border-left: 1px solid var(--border2);
      }
      td:last-child {
        border-left: 1px solid var(--border);
      }

      /* ── Loading ── */
      #loading {
        text-align: center;
        padding: 100px 32px;
        color: var(--muted);
        font-size: 0.9rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .spinner {
        width: 28px;
        height: 28px;
        border: 2px solid var(--border2);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Fade-in ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      #price-table tbody tr {
        animation: fadeUp 0.25s ease both;
      }
      #price-table tbody tr:nth-child(1) {
        animation-delay: 0.02s;
      }
      #price-table tbody tr:nth-child(2) {
        animation-delay: 0.04s;
      }
      #price-table tbody tr:nth-child(3) {
        animation-delay: 0.06s;
      }
      #price-table tbody tr:nth-child(4) {
        animation-delay: 0.08s;
      }
      #price-table tbody tr:nth-child(5) {
        animation-delay: 0.1s;
      }
      #price-table tbody tr:nth-child(6) {
        animation-delay: 0.12s;
      }
      #price-table tbody tr:nth-child(7) {
        animation-delay: 0.14s;
      }
      #price-table tbody tr:nth-child(8) {
        animation-delay: 0.16s;
      }
      #price-table tbody tr:nth-child(9) {
        animation-delay: 0.18s;
      }
      #price-table tbody tr:nth-child(10) {
        animation-delay: 0.2s;
      }

      /* ── Stats bar ── */
      .stats-bar {
        padding: 0 32px;
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
        margin-top: 16px;
        margin-bottom: 4px;
      }
      .stat-pill {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.75rem;
      }
      .stat-label {
        color: var(--muted);
      }
      .stat-value {
        color: var(--text);
        font-family: "DM Mono", monospace;
        font-weight: 500;
      }

      /* ── Mobile Responsive ── */
      @media (max-width: 768px) {
        header {
          padding: 0 16px;
          height: 56px;
        }

        header h1 {
          font-size: 0.85rem;
        }

        header h1::after {
          content: none;
        }

        .header-icon {
          width: 28px;
          height: 28px;
          font-size: 14px;
        }

        #last-scraped {
          font-size: 0.62rem;
          padding: 3px 8px;
        }

        .toolbar {
          padding: 12px 16px 0;
          gap: 10px;
        }

        .search-wrap {
          width: 100%;
        }

        input[type="search"] {
          width: 100%;
          padding: 10px 14px 10px 36px;
          font-size: 0.9rem;
        }

        .legend {
          width: 100%;
          gap: 12px;
          padding-bottom: 4px;
          overflow-x: auto;
          flex-wrap: nowrap;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
          -ms-overflow-style: none;
        }

        .legend::-webkit-scrollbar {
          display: none;
        }

        .legend-item {
          white-space: nowrap;
          font-size: 0.7rem;
        }

        .stats-bar {
          padding: 0 16px;
          gap: 10px;
          margin-top: 12px;
        }

        .stat-pill {
          padding: 6px 10px;
          font-size: 0.7rem;
          gap: 6px;
        }

        .table-wrap {
          padding: 4px 16px 80px;
          position: relative;
        }

        /* Mobile scroll hint indicator */
        .table-wrap::after {
          content: "";
          position: absolute;
          right: 0;
          top: 0;
          bottom: 0;
          width: 40px;
          background: linear-gradient(to right, transparent, var(--bg));
          pointer-events: none;
          opacity: 0;
          transition: opacity 0.3s;
        }

        .table-wrap.scroll-hint::after {
          opacity: 1;
        }

        table {
          font-size: 0.78rem;
        }

        th {
          padding: 10px 10px;
          font-size: 0.65rem;
        }

        th:first-child {
          padding-left: 12px;
          width: 36px;
        }

        td {
          padding: 9px 10px;
        }

        td:first-child {
          padding-left: 12px;
          font-size: 0.65rem;
        }

        .product-name {
          font-size: 0.78rem;
          max-width: 140px;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .price-tag {
          padding: 4px 8px;
          font-size: 0.72rem;
        }

        #loading {
          padding: 60px 16px;
          font-size: 0.85rem;
        }
      }

      @media (max-width: 480px) {
        header h1 {
          font-size: 0.75rem;
        }

        .header-right {
          gap: 10px;
        }

        #last-scraped {
          display: none;
        }

        .toolbar {
          padding: 10px 12px 0;
        }

        .stats-bar {
          padding: 0 12px;
        }

        .table-wrap {
          padding: 4px 12px 80px;
        }

        .product-name {
          max-width: 110px;
        }

        .price-tag {
          padding: 3px 6px;
          font-size: 0.68rem;
        }
      }

      /* ── Touch Scroll Enhancements ── */
      .table-wrap {
        touch-action: pan-x;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        cursor: grab;
      }

      .table-wrap:active {
        cursor: grabbing;
      }

      .table-wrap::-webkit-scrollbar {
        height: 8px;
      }

      .table-wrap::-webkit-scrollbar-track {
        background: var(--surface);
        border-radius: 4px;
      }

      .table-wrap::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 4px;
      }

      .table-wrap::-webkit-scrollbar-thumb:hover {
        background: var(--muted);
      }

      /* Firefox scrollbar */
      .table-wrap {
        scrollbar-width: thin;
        scrollbar-color: var(--border2) var(--surface);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-left">
        <div class="header-icon">🚁</div>
        <h1><span>Jetayu</span> — Competitor Price Monitor</h1>
      </div>
      <div class="header-right">
        <span id="last-scraped">Loading…</span>
      </div>
    </header>

    <div class="toolbar">
      <div class="search-wrap">
        <svg
          width="15"
          height="15"
          viewBox="0 0 15 15"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M10 6.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0Zm-.889 3.318 2.56 2.56-.707.707-2.56-2.56A4.5 4.5 0 1 1 9.11 9.818Z"
            fill="currentColor"
          />
        </svg>
        <input
          type="search"
          id="search"
          placeholder="Search product…"
          autocomplete="off"
        />
      </div>

      <div class="legend">
        <span class="legend-item"
          ><span class="dot" style="background: #818cf8"></span>Jetayu
          (us)</span
        >
        <span class="legend-item"
          ><span class="dot" style="background: #34d399"></span>Lowest
          competitor</span
        >
        <span class="legend-item"
          ><span class="dot" style="background: #f87171"></span>Highest
          competitor</span
        >
        <span class="legend-item"
          ><span
            class="dot"
            style="
              background: rgba(255, 255, 255, 0.1);
              border: 1px solid #1e2336;
            "
          ></span
          >Mid range</span
        >
      </div>
    </div>

    <div class="stats-bar" id="stats-bar" style="display: none">
      <div class="stat-pill">
        <span class="stat-label">Products</span
        ><span class="stat-value" id="stat-products">—</span>
      </div>
      <div class="stat-pill">
        <span class="stat-label">Competitors</span
        ><span class="stat-value" id="stat-comps">—</span>
      </div>
      <div class="stat-pill">
        <span class="stat-label">Cheaper than all</span
        ><span class="stat-value" id="stat-wins">—</span>
      </div>
    </div>

    <div class="table-wrap">
      <div id="loading">
        <div class="spinner"></div>
        <span>Loading price data…</span>
      </div>
      <table id="price-table" style="display: none">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <script>
      const COMPETITORS = [
        "Jetayu",
        "Xboom",
        "Everse",
        "Airytek",
        "Hobitech",
        "Designinfo",
      ];
      const fmt = (n) => (n ? "₹" + n.toLocaleString("en-IN") : null);

      async function load() {
        const res = await fetch("prices.json");
        const data = await res.json();

        document.getElementById("last-scraped").textContent =
          "Scraped: " +
          new Date(data.scraped_at).toLocaleString("en-IN", {
            timeZone: "Asia/Kolkata",
          }) +
          " IST";

        // Build table header
        const thead = document.getElementById("thead");
        thead.innerHTML = `<tr>
    <th>#</th>
    <th>Product</th>
    ${COMPETITORS.map((c) => `<th>${c}</th>`).join("")}
    <th>Savings vs Lowest</th>
  </tr>`;

        // Build rows
        const tbody = document.getElementById("tbody");
        let html = "";
        let wins = 0;

        for (const p of data.products) {
          const competitorPrices = COMPETITORS.filter(
            (c) => c !== "Jetayu" && p.prices[c]?.price,
          ).map((c) => p.prices[c].price);

          const jetayuPrice = p.prices["Jetayu"]?.price;
          const lowestComp = competitorPrices.length
            ? Math.min(...competitorPrices)
            : null;
          const highestComp = competitorPrices.length
            ? Math.max(...competitorPrices)
            : null;
          const savings =
            jetayuPrice && lowestComp ? lowestComp - jetayuPrice : null;
          if (savings > 0) wins++;

          const cells = COMPETITORS.map((c) => {
            const entry = p.prices[c];
            if (!entry)
              return `<td class="price-cell"><span class="price-na">—</span></td>`;

            const price = entry.price;
            const url = entry.url;
            const tag = fmt(price);

            if (!tag)
              return `<td class="price-cell"><span class="price-na">N/A</span></td>`;

            let cls = "price-mid";
            if (c === "Jetayu") cls = "price-jetayu";
            else if (price === lowestComp) cls = "price-lowest";
            else if (price === highestComp) cls = "price-highest";

            return `<td class="price-cell">
        <a href="${url}" target="_blank" title="Open ${c} page">
          <span class="price-tag ${cls}">${tag}</span>
        </a>
      </td>`;
          }).join("");

          const savingsCell =
            savings !== null
              ? `<td class="price-cell"><span class="price-tag ${savings > 0 ? "price-lowest" : savings < 0 ? "price-highest" : "price-mid"}">${savings > 0 ? "+" : ""}${fmt(savings)}</span></td>`
              : `<td class="price-cell"><span class="price-na">—</span></td>`;

          html += `<tr data-name="${p.name.toLowerCase()}">
      <td>${p.id}</td>
      <td class="product-name">${p.name}</td>
      ${cells}
      ${savingsCell}
    </tr>`;
        }

        tbody.innerHTML = html;

        // Stats
        document.getElementById("stat-products").textContent =
          data.products.length;
        document.getElementById("stat-comps").textContent =
          COMPETITORS.length - 1;
        document.getElementById("stat-wins").textContent =
          `${wins} / ${data.products.length}`;
        document.getElementById("stats-bar").style.display = "flex";

        document.getElementById("loading").style.display = "none";
        document.getElementById("price-table").style.display = "table";
      }

      document.getElementById("search").addEventListener("input", function () {
        const q = this.value.toLowerCase();
        document.querySelectorAll("#tbody tr").forEach((tr) => {
          tr.style.display = tr.dataset.name.includes(q) ? "" : "none";
        });
      });

      load().catch((e) => {
        document.getElementById("loading").innerHTML =
          `<span style="color:#f87171">Failed to load data: ${e.message}</span>`;
      });

      // ── Touch Swipe Horizontal Scroll ──
      (function () {
        const tableWrap = document.querySelector(".table-wrap");
        if (!tableWrap) return;

        let startX = 0;
        let scrollLeft = 0;
        let isDragging = false;
        let hasScrolled = false;

        // Mouse drag scroll
        tableWrap.addEventListener("mousedown", (e) => {
          if (e.target.closest("a")) return;
          isDragging = true;
          hasScrolled = false;
          startX = e.pageX - tableWrap.offsetLeft;
          scrollLeft = tableWrap.scrollLeft;
          tableWrap.style.cursor = "grabbing";
        });

        document.addEventListener("mouseup", () => {
          isDragging = false;
          tableWrap.style.cursor = "grab";
        });

        document.addEventListener("mousemove", (e) => {
          if (!isDragging) return;
          e.preventDefault();
          const x = e.pageX - tableWrap.offsetLeft;
          const walk = (x - startX) * 1.5;
          if (Math.abs(walk) > 5) hasScrolled = true;
          tableWrap.scrollLeft = scrollLeft - walk;
        });

        // Prevent link clicks when dragging
        tableWrap.addEventListener("click", (e) => {
          if (hasScrolled && e.target.closest("a")) {
            e.preventDefault();
            e.stopPropagation();
            hasScrolled = false;
          }
        });

        // Touch scroll
        let touchStartX = 0;
        let touchScrollLeft = 0;
        let touchHasScrolled = false;

        tableWrap.addEventListener("touchstart", (e) => {
          touchStartX = e.touches[0].pageX;
          touchScrollLeft = tableWrap.scrollLeft;
          touchHasScrolled = false;
        }, { passive: true });

        tableWrap.addEventListener("touchmove", (e) => {
          const touchX = e.touches[0].pageX;
          const walk = touchStartX - touchX;
          if (Math.abs(walk) > 8) {
            touchHasScrolled = true;
            tableWrap.classList.add("scroll-hint");
          }
          tableWrap.scrollLeft = touchScrollLeft + walk;
        }, { passive: true });

        tableWrap.addEventListener("touchend", (e) => {
          if (touchHasScrolled) {
            e.preventDefault();
          }
          // Hide scroll hint after scrolling stops
          setTimeout(() => {
            tableWrap.classList.remove("scroll-hint");
          }, 1500);
        }, { passive: false });

        // Show scroll hint on load if table is wider than viewport
        function checkOverflow() {
          if (tableWrap.scrollWidth > tableWrap.clientWidth + 10) {
            tableWrap.classList.add("scroll-hint");
            setTimeout(() => {
              tableWrap.classList.remove("scroll-hint");
            }, 2000);
          }
        }

        // Check on load and resize
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", () => setTimeout(checkOverflow, 500));
        } else {
          setTimeout(checkOverflow, 500);
        }

        window.addEventListener("resize", checkOverflow);
      })();
    </script>
  </body>
</html>
